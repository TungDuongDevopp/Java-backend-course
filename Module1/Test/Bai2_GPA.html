<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cấu trúc điều kiện</title>
</head>
<body>
    <script>
        let GPA;
        do{
            GPA = parseFloat(prompt("Mời bạn nhập điểm GPA: "));
        }while (GPA<0 || GPA>10 || isNaN(GPA))

        if(GPA>=8){
            console.log("Giỏi");
        }
        else if(GPA>=6.5 && GPA <8){
            console.log("Khá");
        }
        else if(GPA>=5 && GPA <6.5){
            console.log("Trung bình");
        }
        else {
            console.log("Yếu");
        }

    </script>
</body>
</html>
