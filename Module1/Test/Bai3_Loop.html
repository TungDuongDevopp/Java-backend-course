<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vòng lặp</title>
</head>
<body>
    <script>
        let sum = 0;
        console.log("Các số từ 1 đến 20 là: ");
        for(let i=1;i<=20;i++){
            console.log(i);
            sum+=i;
        }
        console.log(`Tổng các số từ ${1} -> ${20}: ${sum}`);

        console.log("Các số chẵn từ 1 đến 20 là: ");
        for(let i=1;i<=20;i++){
            if(isEven(i)){
                console.log(i);
            }

        }

        function isEven(n){
            return n % 2 == 0;
        }
    </script>
</body>
</html>
